name: Weekly Meme Update

on:
  schedule:
    # Every Monday at 00:00 UTC (08:00 Beijing time)
    - cron: '0 0 * * 1'
  workflow_dispatch:  # Allow manual trigger

permissions:
  contents: write

jobs:
  scrape-and-update:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          # Persist credentials so the push works
          persist-credentials: true

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install requests beautifulsoup4

      - name: Run meme scraper
        run: python scripts/scrape_memes.py

      - name: Check for changes
        id: changed
        run: |
          if git diff --quiet HEAD -- data/memes.json; then
            echo "changed=false" >> "$GITHUB_OUTPUT"
            echo "No changes to data/memes.json"
          else
            echo "changed=true" >> "$GITHUB_OUTPUT"
            echo "Data file has changed"
          fi

      - name: Commit and push data update
        if: steps.changed.outputs.changed == 'true'
        run: |
          TIMESTAMP="$(date -u '+%Y-%m-%d %H:%M UTC')"
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/memes.json
          git commit -m "chore: weekly meme update — ${TIMESTAMP}"
          git push
